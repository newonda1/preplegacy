<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PrepLegacy hero poster</title>
  <desc id="desc">Abstract navy, teal, and gold background used as the PrepLegacy hero fallback.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2138" />
      <stop offset="55%" stop-color="#123d59" />
      <stop offset="100%" stop-color="#1a5b63" />
    </linearGradient>
    <radialGradient id="goldGlow" cx="25%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#c2862d" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#c2862d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="tealGlow" cx="80%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#goldGlow)" />
  <rect width="1600" height="900" fill="url(#tealGlow)" />

  <g opacity="0.14" stroke="#ffffff">
    <path d="M0 140H1600" />
    <path d="M0 260H1600" />
    <path d="M0 380H1600" />
    <path d="M0 500H1600" />
    <path d="M0 620H1600" />
    <path d="M0 740H1600" />
    <path d="M180 0V900" />
    <path d="M360 0V900" />
    <path d="M540 0V900" />
    <path d="M720 0V900" />
    <path d="M900 0V900" />
    <path d="M1080 0V900" />
    <path d="M1260 0V900" />
    <path d="M1440 0V900" />
  </g>

  <g opacity="0.16">
    <circle cx="1180" cy="180" r="180" fill="#0f766e" />
    <circle cx="290" cy="620" r="210" fill="#c2862d" />
    <circle cx="1325" cy="720" r="120" fill="#f4d4a0" />
  </g>

  <g fill="none" stroke="#f6efe4" stroke-width="3" opacity="0.42">
    <rect x="125" y="128" width="520" height="290" rx="26" />
    <rect x="955" y="224" width="345" height="188" rx="24" />
    <rect x="990" y="456" width="290" height="176" rx="22" />
  </g>

  <g fill="#f8f2e8">
